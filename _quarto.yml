book:
  title: "콘텐츠는 어떻게 산업으로 연구되어 왔는가?: 국내 콘텐츠 산업 연구에 대한 체계적 문헌고찰과 네트워크 분석"
  subtitle: "제목: 콘텐츠는 어떻게 산업으로 연구되어 왔는가?: 국내 콘텐츠 산업 연구에 대한 체계적 문헌고찰과 네트워크 분석

RQ1. 콘텐츠 산업 연구는 시기별로 어떠한 주요 주제와 개념적 전환을 보여 왔는가?
RQ2. 콘텐츠 산업 연구에서 비즈니스적 관점은 어떠한 하위 영역(정책, 플랫폼, 수익모델, 기술혁신, 글로벌화, 노동 등)으로 구성되어 왔는가? (콘텐츠 연구가 스토리·텍스트 중심에서 얼마나 산업·시장 중심으로 이동했는지, 또는 반대로 산업을 말하지만 실제로는 정책 담론에 치우쳐 있는지)
RQ3. 콘텐츠 산업 연구의 핵심 키워드와 주제들은 어떠한 지식 네트워크를 형성하고 있으며, 그 중심성과 군집은 어떻게 나타나는가?
RQ4. 콘텐츠 산업 연구의 주요 편중과 공백은 무엇이며, 향후 산업 연구의 확장 방향은 무엇인가? (상대적으로 덜 보이는 축: 창작자 노동, 기업 수준의 수익모델 비교, 콘텐츠 가치사슬 전반을 통합적으로 보는 연구)


제목에 콘텐츠 and 산업 "
